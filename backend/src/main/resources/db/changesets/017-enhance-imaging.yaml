databaseChangeLog:
  - changeSet:
      id: 017-create-imaging-results
      author: primus
      comment: Imaging results — radiology reports linked to patients and optional lab orders
      changes:
        - createTable:
            tableName: imaging_results
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: uuid
                  type: VARCHAR(36)
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    unique: true
                    nullable: false
              - column:
                  name: tenant_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_imaging_results_tenant
                    references: tenants(id)
              - column:
                  name: order_id
                  type: BIGINT
                  constraints:
                    foreignKeyName: fk_imaging_results_lab_order
                    references: lab_orders(id)
              - column:
                  name: patient_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_imaging_results_patient
                    references: patients(id)
              - column:
                  name: modality
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: study_description
                  type: VARCHAR(500)
              - column:
                  name: radiologist
                  type: VARCHAR(255)
              - column:
                  name: report
                  type: TEXT
              - column:
                  name: impression
                  type: TEXT
              - column:
                  name: status
                  type: VARCHAR(20)
                  defaultValue: PENDING
                  constraints:
                    nullable: false
              - column:
                  name: result_date
                  type: TIMESTAMP
              - column:
                  name: created_by
                  type: VARCHAR(255)
              - column:
                  name: modified_by
                  type: VARCHAR(255)
              - column:
                  name: created
                  type: TIMESTAMP
                  defaultValueComputed: now()
              - column:
                  name: modified
                  type: TIMESTAMP
                  defaultValueComputed: now()
              - column:
                  name: archive
                  type: BOOLEAN
                  defaultValueBoolean: false

  - changeSet:
      id: 017-imaging-results-index
      author: primus
      comment: Index for fast imaging result lookup by patient
      changes:
        - createIndex:
            tableName: imaging_results
            indexName: idx_imaging_results_patient_tenant
            columns:
              - column:
                  name: patient_id
              - column:
                  name: tenant_id
