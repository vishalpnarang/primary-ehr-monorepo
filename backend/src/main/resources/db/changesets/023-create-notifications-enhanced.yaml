databaseChangeLog:

  # ── 1. device_tokens ──────────────────────────────────────────────────────────
  - changeSet:
      id: 023-create-device-tokens
      author: primus
      comment: Push notification device tokens for WEB, iOS, and Android
      changes:
        - createTable:
            tableName: device_tokens
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: uuid
                  type: VARCHAR(36)
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    unique: true
                    nullable: false
              - column:
                  name: user_id
                  type: VARCHAR(36)
                  constraints:
                    nullable: false
              - column:
                  name: token
                  type: VARCHAR(500)
                  constraints:
                    nullable: false
              - column:
                  name: platform
                  type: VARCHAR(20)
                  constraints:
                    nullable: false
              - column:
                  name: device_name
                  type: VARCHAR(255)
              - column:
                  name: is_active
                  type: BOOLEAN
                  defaultValueBoolean: true
                  constraints:
                    nullable: false
              - column:
                  name: tenant_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_device_tokens_tenant
                    references: tenants(id)
              - column:
                  name: created_by
                  type: VARCHAR(255)
              - column:
                  name: modified_by
                  type: VARCHAR(255)
              - column:
                  name: created
                  type: TIMESTAMP
                  defaultValueComputed: now()
              - column:
                  name: modified
                  type: TIMESTAMP
                  defaultValueComputed: now()
              - column:
                  name: archive
                  type: BOOLEAN
                  defaultValueBoolean: false
                  constraints:
                    nullable: false

  - changeSet:
      id: 023-device-tokens-unique
      author: primus
      comment: Unique constraint on device token value
      changes:
        - addUniqueConstraint:
            tableName: device_tokens
            columnNames: token
            constraintName: uq_device_tokens_token

  - changeSet:
      id: 023-device-tokens-index
      author: primus
      comment: Index for device token lookup by user
      changes:
        - createIndex:
            tableName: device_tokens
            indexName: idx_device_tokens_user_id
            columns:
              - column:
                  name: user_id

  # ── 2. notification_preferences ───────────────────────────────────────────────
  - changeSet:
      id: 023-create-notification-preferences
      author: primus
      comment: Per-user per-event-type channel preferences for notifications
      changes:
        - createTable:
            tableName: notification_preferences
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: uuid
                  type: VARCHAR(36)
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    unique: true
                    nullable: false
              - column:
                  name: user_id
                  type: VARCHAR(36)
                  constraints:
                    nullable: false
              - column:
                  name: event_type
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: channel_email
                  type: BOOLEAN
                  defaultValueBoolean: true
                  constraints:
                    nullable: false
              - column:
                  name: channel_sms
                  type: BOOLEAN
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
              - column:
                  name: channel_push
                  type: BOOLEAN
                  defaultValueBoolean: true
                  constraints:
                    nullable: false
              - column:
                  name: channel_in_app
                  type: BOOLEAN
                  defaultValueBoolean: true
                  constraints:
                    nullable: false
              - column:
                  name: tenant_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_notification_prefs_tenant
                    references: tenants(id)
              - column:
                  name: created_by
                  type: VARCHAR(255)
              - column:
                  name: modified_by
                  type: VARCHAR(255)
              - column:
                  name: created
                  type: TIMESTAMP
                  defaultValueComputed: now()
              - column:
                  name: modified
                  type: TIMESTAMP
                  defaultValueComputed: now()
              - column:
                  name: archive
                  type: BOOLEAN
                  defaultValueBoolean: false
                  constraints:
                    nullable: false

  - changeSet:
      id: 023-notification-preferences-unique
      author: primus
      comment: One preference row per user per event per tenant
      changes:
        - addUniqueConstraint:
            tableName: notification_preferences
            columnNames: user_id, event_type, tenant_id
            constraintName: uq_notification_prefs_user_event_tenant

  # ── 3. notification_log ───────────────────────────────────────────────────────
  - changeSet:
      id: 023-create-notification-log
      author: primus
      comment: Outbound notification delivery log for all channels
      changes:
        - createTable:
            tableName: notification_log
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: uuid
                  type: VARCHAR(36)
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    unique: true
                    nullable: false
              - column:
                  name: recipient_id
                  type: VARCHAR(36)
                  constraints:
                    nullable: false
              - column:
                  name: channel
                  type: VARCHAR(20)
                  constraints:
                    nullable: false
              - column:
                  name: event_type
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: subject
                  type: VARCHAR(500)
              - column:
                  name: body
                  type: TEXT
              - column:
                  name: status
                  type: VARCHAR(20)
                  defaultValue: SENT
                  constraints:
                    nullable: false
              - column:
                  name: error_message
                  type: TEXT
              - column:
                  name: external_id
                  type: VARCHAR(255)
              - column:
                  name: tenant_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_notification_log_tenant
                    references: tenants(id)
              - column:
                  name: created_by
                  type: VARCHAR(255)
              - column:
                  name: modified_by
                  type: VARCHAR(255)
              - column:
                  name: created
                  type: TIMESTAMP
                  defaultValueComputed: now()
              - column:
                  name: modified
                  type: TIMESTAMP
                  defaultValueComputed: now()
              - column:
                  name: archive
                  type: BOOLEAN
                  defaultValueBoolean: false
                  constraints:
                    nullable: false

  - changeSet:
      id: 023-notification-log-index
      author: primus
      comment: Index for notification log lookup by recipient and tenant
      changes:
        - createIndex:
            tableName: notification_log
            indexName: idx_notification_log_recipient
            columns:
              - column:
                  name: recipient_id
              - column:
                  name: tenant_id

  # ── 4. email_templates ────────────────────────────────────────────────────────
  - changeSet:
      id: 023-create-email-templates
      author: primus
      comment: Tenant-scoped email templates for all notification event types
      changes:
        - createTable:
            tableName: email_templates
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: uuid
                  type: VARCHAR(36)
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    unique: true
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: subject_template
                  type: VARCHAR(500)
                  constraints:
                    nullable: false
              - column:
                  name: body_template
                  type: TEXT
                  constraints:
                    nullable: false
              - column:
                  name: category
                  type: VARCHAR(50)
              - column:
                  name: tenant_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_email_templates_tenant
                    references: tenants(id)
              - column:
                  name: created_by
                  type: VARCHAR(255)
              - column:
                  name: modified_by
                  type: VARCHAR(255)
              - column:
                  name: created
                  type: TIMESTAMP
                  defaultValueComputed: now()
              - column:
                  name: modified
                  type: TIMESTAMP
                  defaultValueComputed: now()
              - column:
                  name: archive
                  type: BOOLEAN
                  defaultValueBoolean: false
                  constraints:
                    nullable: false

  - changeSet:
      id: 023-email-templates-unique
      author: primus
      comment: Template names must be unique per tenant
      changes:
        - addUniqueConstraint:
            tableName: email_templates
            columnNames: tenant_id, name
            constraintName: uq_email_templates_tenant_name
