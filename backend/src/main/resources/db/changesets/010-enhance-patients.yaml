databaseChangeLog:

  # ─── family_history ───────────────────────────────────────────────────────
  - changeSet:
      id: 010-create-family-history
      author: primus
      changes:
        - createTable:
            tableName: family_history
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: uuid
                  type: VARCHAR(36)
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    unique: true
                    nullable: false
              - column:
                  name: tenant_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_family_history_tenant
                    references: tenants(id)
              - column:
                  name: patient_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_family_history_patient
                    references: patients(id)
              - column:
                  name: relationship
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: condition
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: icd10_code
                  type: VARCHAR(20)
              - column:
                  name: onset_age
                  type: INTEGER
              - column:
                  name: deceased
                  type: BOOLEAN
                  defaultValueBoolean: false
              - column:
                  name: notes
                  type: TEXT
              - column:
                  name: created_by
                  type: VARCHAR(255)
              - column:
                  name: modified_by
                  type: VARCHAR(255)
              - column:
                  name: created
                  type: TIMESTAMP
                  defaultValueComputed: now()
              - column:
                  name: modified
                  type: TIMESTAMP
                  defaultValueComputed: now()
              - column:
                  name: archive
                  type: BOOLEAN
                  defaultValueBoolean: false

  - changeSet:
      id: 010-family-history-index
      author: primus
      changes:
        - createIndex:
            tableName: family_history
            indexName: idx_family_history_patient_id
            columns:
              - column:
                  name: patient_id

