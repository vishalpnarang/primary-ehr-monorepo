databaseChangeLog:

  # ── 1. tickets ────────────────────────────────────────────────────────────────
  - changeSet:
      id: 025-create-tickets
      author: primus
      comment: CRM support tickets linked optionally to a patient
      changes:
        - createTable:
            tableName: tickets
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: uuid
                  type: VARCHAR(36)
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    unique: true
                    nullable: false
              - column:
                  name: subject
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: TEXT
              - column:
                  name: status
                  type: VARCHAR(20)
                  defaultValue: OPEN
                  constraints:
                    nullable: false
              - column:
                  name: priority
                  type: VARCHAR(20)
                  defaultValue: MEDIUM
                  constraints:
                    nullable: false
              - column:
                  name: category
                  type: VARCHAR(50)
              - column:
                  name: assigned_to
                  type: VARCHAR(36)
              - column:
                  name: patient_id
                  type: BIGINT
                  constraints:
                    foreignKeyName: fk_tickets_patient
                    references: patients(id)
              - column:
                  name: reporter_id
                  type: VARCHAR(36)
              - column:
                  name: tenant_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_tickets_tenant
                    references: tenants(id)
              - column:
                  name: created_by
                  type: VARCHAR(255)
              - column:
                  name: modified_by
                  type: VARCHAR(255)
              - column:
                  name: created
                  type: TIMESTAMP
                  defaultValueComputed: now()
              - column:
                  name: modified
                  type: TIMESTAMP
                  defaultValueComputed: now()
              - column:
                  name: archive
                  type: BOOLEAN
                  defaultValueBoolean: false
                  constraints:
                    nullable: false

  - changeSet:
      id: 025-tickets-indexes
      author: primus
      comment: Indexes for ticket lookup by tenant, status, and patient
      changes:
        - createIndex:
            tableName: tickets
            indexName: idx_tickets_tenant_status
            columns:
              - column:
                  name: tenant_id
              - column:
                  name: status
        - createIndex:
            tableName: tickets
            indexName: idx_tickets_patient_id
            columns:
              - column:
                  name: patient_id

  # ── 2. ticket_comments ────────────────────────────────────────────────────────
  - changeSet:
      id: 025-create-ticket-comments
      author: primus
      comment: Comments on support tickets with internal/external flag
      changes:
        - createTable:
            tableName: ticket_comments
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: uuid
                  type: VARCHAR(36)
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    unique: true
                    nullable: false
              - column:
                  name: ticket_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_ticket_comments_ticket
                    references: tickets(id)
              - column:
                  name: user_id
                  type: VARCHAR(36)
                  constraints:
                    nullable: false
              - column:
                  name: comment
                  type: TEXT
                  constraints:
                    nullable: false
              - column:
                  name: is_internal
                  type: BOOLEAN
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
              - column:
                  name: tenant_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_ticket_comments_tenant
                    references: tenants(id)
              - column:
                  name: created_by
                  type: VARCHAR(255)
              - column:
                  name: modified_by
                  type: VARCHAR(255)
              - column:
                  name: created
                  type: TIMESTAMP
                  defaultValueComputed: now()
              - column:
                  name: modified
                  type: TIMESTAMP
                  defaultValueComputed: now()
              - column:
                  name: archive
                  type: BOOLEAN
                  defaultValueBoolean: false
                  constraints:
                    nullable: false

  - changeSet:
      id: 025-ticket-comments-index
      author: primus
      comment: Index for comment lookup by ticket
      changes:
        - createIndex:
            tableName: ticket_comments
            indexName: idx_ticket_comments_ticket_id
            columns:
              - column:
                  name: ticket_id

  # ── 3. campaigns ──────────────────────────────────────────────────────────────
  - changeSet:
      id: 025-create-campaigns
      author: primus
      comment: Marketing/outreach campaign definitions with audience targeting and metrics
      changes:
        - createTable:
            tableName: campaigns
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: uuid
                  type: VARCHAR(36)
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    unique: true
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: type
                  type: VARCHAR(50)
              - column:
                  name: status
                  type: VARCHAR(20)
                  defaultValue: DRAFT
                  constraints:
                    nullable: false
              - column:
                  name: target_audience
                  type: JSONB
              - column:
                  name: scheduled_at
                  type: TIMESTAMP
              - column:
                  name: completed_at
                  type: TIMESTAMP
              - column:
                  name: metrics
                  type: JSONB
              - column:
                  name: tenant_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_campaigns_tenant
                    references: tenants(id)
              - column:
                  name: created_by
                  type: VARCHAR(255)
              - column:
                  name: modified_by
                  type: VARCHAR(255)
              - column:
                  name: created
                  type: TIMESTAMP
                  defaultValueComputed: now()
              - column:
                  name: modified
                  type: TIMESTAMP
                  defaultValueComputed: now()
              - column:
                  name: archive
                  type: BOOLEAN
                  defaultValueBoolean: false
                  constraints:
                    nullable: false

  - changeSet:
      id: 025-campaigns-index
      author: primus
      comment: Index for campaign lookup by tenant and status
      changes:
        - createIndex:
            tableName: campaigns
            indexName: idx_campaigns_tenant_status
            columns:
              - column:
                  name: tenant_id
              - column:
                  name: status

  # ── 4. leads ──────────────────────────────────────────────────────────────────
  - changeSet:
      id: 025-create-leads
      author: primus
      comment: CRM lead records for prospective patients
      changes:
        - createTable:
            tableName: leads
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: uuid
                  type: VARCHAR(36)
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    unique: true
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: email
                  type: VARCHAR(255)
              - column:
                  name: phone
                  type: VARCHAR(20)
              - column:
                  name: source
                  type: VARCHAR(50)
              - column:
                  name: status
                  type: VARCHAR(20)
                  defaultValue: NEW
                  constraints:
                    nullable: false
              - column:
                  name: assigned_to
                  type: VARCHAR(36)
              - column:
                  name: notes
                  type: TEXT
              - column:
                  name: tenant_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_leads_tenant
                    references: tenants(id)
              - column:
                  name: created_by
                  type: VARCHAR(255)
              - column:
                  name: modified_by
                  type: VARCHAR(255)
              - column:
                  name: created
                  type: TIMESTAMP
                  defaultValueComputed: now()
              - column:
                  name: modified
                  type: TIMESTAMP
                  defaultValueComputed: now()
              - column:
                  name: archive
                  type: BOOLEAN
                  defaultValueBoolean: false
                  constraints:
                    nullable: false

  - changeSet:
      id: 025-leads-index
      author: primus
      comment: Index for lead lookup by tenant and status
      changes:
        - createIndex:
            tableName: leads
            indexName: idx_leads_tenant_status
            columns:
              - column:
                  name: tenant_id
              - column:
                  name: status
