databaseChangeLog:
  - changeSet:
      id: 003-create-patients
      author: primus
      changes:
        - createTable:
            tableName: patients
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: uuid
                  type: VARCHAR(36)
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    unique: true
                    nullable: false
              - column:
                  name: tenant_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_patients_tenant
                    references: tenants(id)
              - column:
                  name: mrn
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: first_name
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: last_name
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: preferred_name
                  type: VARCHAR(100)
              - column:
                  name: dob
                  type: DATE
                  constraints:
                    nullable: false
              - column:
                  name: sex
                  type: VARCHAR(20)
              - column:
                  name: gender
                  type: VARCHAR(50)
              - column:
                  name: pronouns
                  type: VARCHAR(50)
              - column:
                  name: phone
                  type: VARCHAR(20)
              - column:
                  name: email
                  type: VARCHAR(255)
              - column:
                  name: address_line1
                  type: VARCHAR(255)
              - column:
                  name: address_line2
                  type: VARCHAR(255)
              - column:
                  name: city
                  type: VARCHAR(100)
              - column:
                  name: state
                  type: VARCHAR(50)
              - column:
                  name: zip
                  type: VARCHAR(10)
              - column:
                  name: emergency_contact_name
                  type: VARCHAR(200)
              - column:
                  name: emergency_contact_relation
                  type: VARCHAR(100)
              - column:
                  name: emergency_contact_phone
                  type: VARCHAR(20)
              - column:
                  name: primary_provider_id
                  type: BIGINT
                  constraints:
                    foreignKeyName: fk_patients_primary_provider
                    references: users(id)
              - column:
                  name: status
                  type: VARCHAR(50)
                  defaultValue: ACTIVE
              - column:
                  name: photo_url
                  type: VARCHAR(1024)
              - column:
                  name: created_by
                  type: VARCHAR(255)
              - column:
                  name: modified_by
                  type: VARCHAR(255)
              - column:
                  name: created
                  type: TIMESTAMP
                  defaultValueComputed: now()
              - column:
                  name: modified
                  type: TIMESTAMP
                  defaultValueComputed: now()
              - column:
                  name: archive
                  type: BOOLEAN
                  defaultValueBoolean: false

  - changeSet:
      id: 003-patients-unique-mrn-per-tenant
      author: primus
      changes:
        - addUniqueConstraint:
            tableName: patients
            columnNames: tenant_id, mrn
            constraintName: uq_patients_tenant_mrn

  - changeSet:
      id: 003-patients-indexes
      author: primus
      changes:
        - createIndex:
            tableName: patients
            indexName: idx_patients_tenant_mrn
            columns:
              - column:
                  name: tenant_id
              - column:
                  name: mrn
        - createIndex:
            tableName: patients
            indexName: idx_patients_tenant_name
            columns:
              - column:
                  name: tenant_id
              - column:
                  name: last_name
              - column:
                  name: first_name
        - createIndex:
            tableName: patients
            indexName: idx_patients_tenant_dob
            columns:
              - column:
                  name: tenant_id
              - column:
                  name: dob

