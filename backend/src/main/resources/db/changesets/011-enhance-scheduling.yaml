databaseChangeLog:

  # ─── appointment_types ────────────────────────────────────────────────────
  - changeSet:
      id: 011-create-appointment-types
      author: primus
      changes:
        - createTable:
            tableName: appointment_types
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: uuid
                  type: VARCHAR(36)
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    unique: true
                    nullable: false
              - column:
                  name: tenant_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_appointment_types_tenant
                    references: tenants(id)
              - column:
                  name: name
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: duration_minutes
                  type: INTEGER
                  defaultValueNumeric: 30
                  constraints:
                    nullable: false
              - column:
                  name: color
                  type: VARCHAR(7)
              - column:
                  name: description
                  type: VARCHAR(500)
              - column:
                  name: allow_online_booking
                  type: BOOLEAN
                  defaultValueBoolean: false
              - column:
                  name: created_by
                  type: VARCHAR(255)
              - column:
                  name: modified_by
                  type: VARCHAR(255)
              - column:
                  name: created
                  type: TIMESTAMP
                  defaultValueComputed: now()
              - column:
                  name: modified
                  type: TIMESTAMP
                  defaultValueComputed: now()
              - column:
                  name: archive
                  type: BOOLEAN
                  defaultValueBoolean: false

  - changeSet:
      id: 011-appointment-types-unique
      author: primus
      changes:
        - addUniqueConstraint:
            tableName: appointment_types
            columnNames: tenant_id, name
            constraintName: uq_appointment_types_tenant_name

