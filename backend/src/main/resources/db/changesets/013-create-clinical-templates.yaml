  # ── 5. annotable_images ───────────────────────────────────────────────────────
  - changeSet:
      id: 013-create-annotable-images
      author: primus
      comment: Base anatomical images that providers can pin annotations on
      changes:
        - createTable:
            tableName: annotable_images
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: uuid
                  type: VARCHAR(36)
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    unique: true
                    nullable: false
              - column:
                  name: tenant_id
                  type: BIGINT
                  constraints:
                    foreignKeyName: fk_annotable_images_tenant
                    references: tenants(id)
              - column:
                  name: name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: category
                  type: VARCHAR(50)
              - column:
                  name: image_url
                  type: VARCHAR(1024)
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: TEXT
              - column:
                  name: is_system
                  type: BOOLEAN
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
              - column:
                  name: created_by
                  type: VARCHAR(255)
              - column:
                  name: modified_by
                  type: VARCHAR(255)
              - column:
                  name: created
                  type: TIMESTAMP
                  defaultValueComputed: now()
              - column:
                  name: modified
                  type: TIMESTAMP
                  defaultValueComputed: now()
              - column:
                  name: archive
                  type: BOOLEAN
                  defaultValueBoolean: false
                  constraints:
                    nullable: false

  # ── 6. annotable_image_pins ───────────────────────────────────────────────────
  - changeSet:
      id: 013-create-annotable-image-pins
      author: primus
      comment: Per-encounter or per-patient annotation pins on an anatomical image
      changes:
        - createTable:
            tableName: annotable_image_pins
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: uuid
                  type: VARCHAR(36)
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    unique: true
                    nullable: false
              - column:
                  name: tenant_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_image_pins_tenant
                    references: tenants(id)
              - column:
                  name: image_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_image_pins_image
                    references: annotable_images(id)
              - column:
                  name: encounter_id
                  type: BIGINT
                  constraints:
                    foreignKeyName: fk_image_pins_encounter
                    references: encounters(id)
              - column:
                  name: patient_id
                  type: BIGINT
                  constraints:
                    foreignKeyName: fk_image_pins_patient
                    references: patients(id)
              - column:
                  name: x_position
                  type: DECIMAL(5,2)
                  constraints:
                    nullable: false
              - column:
                  name: y_position
                  type: DECIMAL(5,2)
                  constraints:
                    nullable: false
              - column:
                  name: label
                  type: VARCHAR(255)
              - column:
                  name: notes
                  type: TEXT
              - column:
                  name: color
                  type: VARCHAR(7)
                  defaultValue: '#FF0000'
              - column:
                  name: created_by
                  type: VARCHAR(255)
              - column:
                  name: modified_by
                  type: VARCHAR(255)
              - column:
                  name: created
                  type: TIMESTAMP
                  defaultValueComputed: now()
              - column:
                  name: modified
                  type: TIMESTAMP
                  defaultValueComputed: now()
              - column:
                  name: archive
                  type: BOOLEAN
                  defaultValueBoolean: false
                  constraints:
                    nullable: false

  - changeSet:
      id: 013-image-pins-indexes
      author: primus
      comment: Indexes for fast pin lookup by image and encounter
      changes:
        - createIndex:
            tableName: annotable_image_pins
            indexName: idx_image_pins_image_id
            columns:
              - column:
                  name: image_id
        - createIndex:
            tableName: annotable_image_pins
            indexName: idx_image_pins_encounter_id
            columns:
              - column:
                  name: encounter_id
