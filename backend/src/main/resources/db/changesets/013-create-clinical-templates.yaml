databaseChangeLog:

  # ── 1. macros ─────────────────────────────────────────────────────────────────
  - changeSet:
      id: 013-create-macros
      author: primus
      comment: Smart-phrase macros — abbreviation expands to full text inside note fields
      changes:
        - createTable:
            tableName: macros
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: uuid
                  type: VARCHAR(36)
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    unique: true
                    nullable: false
              - column:
                  name: tenant_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_macros_tenant
                    references: tenants(id)
              - column:
                  name: name
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: abbreviation
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: expansion
                  type: TEXT
                  constraints:
                    nullable: false
              - column:
                  name: category
                  type: VARCHAR(50)
              - column:
                  name: is_shared
                  type: BOOLEAN
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
              - column:
                  name: created_by_provider
                  type: VARCHAR(36)
              - column:
                  name: created_by
                  type: VARCHAR(255)
              - column:
                  name: modified_by
                  type: VARCHAR(255)
              - column:
                  name: created
                  type: TIMESTAMP
                  defaultValueComputed: now()
              - column:
                  name: modified
                  type: TIMESTAMP
                  defaultValueComputed: now()
              - column:
                  name: archive
                  type: BOOLEAN
                  defaultValueBoolean: false
                  constraints:
                    nullable: false

  - changeSet:
      id: 013-macros-unique-constraint
      author: primus
      comment: Abbreviation must be unique within a tenant
      changes:
        - addUniqueConstraint:
            tableName: macros
            columnNames: tenant_id, abbreviation
            constraintName: uq_macros_tenant_abbreviation

  - changeSet:
      id: 013-macros-indexes
      author: primus
      comment: Indexes for macro lookup by tenant and category
      changes:
        - createIndex:
            tableName: macros
            indexName: idx_macros_tenant_id
            columns:
              - column:
                  name: tenant_id
        - createIndex:
            tableName: macros
            indexName: idx_macros_tenant_category
            columns:
              - column:
                  name: tenant_id
              - column:
                  name: category

  # ── 2. soap_note_templates ────────────────────────────────────────────────────
  - changeSet:
      id: 013-create-soap-note-templates
      author: primus
      comment: Reusable SOAP note templates per visit category
      changes:
        - createTable:
            tableName: soap_note_templates
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: uuid
                  type: VARCHAR(36)
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    unique: true
                    nullable: false
              - column:
                  name: tenant_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_soap_templates_tenant
                    references: tenants(id)
              - column:
                  name: name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: category
                  type: VARCHAR(50)
              - column:
                  name: subjective_template
                  type: TEXT
              - column:
                  name: objective_template
                  type: TEXT
              - column:
                  name: assessment_template
                  type: TEXT
              - column:
                  name: plan_template
                  type: TEXT
              - column:
                  name: is_default
                  type: BOOLEAN
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
              - column:
                  name: created_by
                  type: VARCHAR(255)
              - column:
                  name: modified_by
                  type: VARCHAR(255)
              - column:
                  name: created
                  type: TIMESTAMP
                  defaultValueComputed: now()
              - column:
                  name: modified
                  type: TIMESTAMP
                  defaultValueComputed: now()
              - column:
                  name: archive
                  type: BOOLEAN
                  defaultValueBoolean: false
                  constraints:
                    nullable: false

  - changeSet:
      id: 013-soap-templates-indexes
      author: primus
      comment: Index for SOAP template lookup by tenant
      changes:
        - createIndex:
            tableName: soap_note_templates
            indexName: idx_soap_templates_tenant_id
            columns:
              - column:
                  name: tenant_id

