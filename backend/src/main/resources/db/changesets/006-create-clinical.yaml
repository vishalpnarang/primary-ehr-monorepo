databaseChangeLog:
  - changeSet:
      id: 006-create-lab-orders
      author: primus
      changes:
        - createTable:
            tableName: lab_orders
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: uuid
                  type: VARCHAR(36)
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    unique: true
                    nullable: false
              - column:
                  name: tenant_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_lab_orders_tenant
                    references: tenants(id)
              - column:
                  name: patient_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_lab_orders_patient
                    references: patients(id)
              - column:
                  name: provider_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_lab_orders_provider
                    references: users(id)
              - column:
                  name: facility
                  type: VARCHAR(255)
              - column:
                  name: priority
                  type: VARCHAR(20)
                  defaultValue: ROUTINE
              - column:
                  name: status
                  type: VARCHAR(50)
                  defaultValue: PENDING
              - column:
                  name: ordered_at
                  type: TIMESTAMP
              - column:
                  name: resulted_at
                  type: TIMESTAMP
              - column:
                  name: indication
                  type: VARCHAR(500)
              - column:
                  name: created_by
                  type: VARCHAR(255)
              - column:
                  name: modified_by
                  type: VARCHAR(255)
              - column:
                  name: created
                  type: TIMESTAMP
                  defaultValueComputed: now()
              - column:
                  name: modified
                  type: TIMESTAMP
                  defaultValueComputed: now()
              - column:
                  name: archive
                  type: BOOLEAN
                  defaultValueBoolean: false

