databaseChangeLog:
  - changeSet:
      id: 002-create-users
      author: primus
      comment: Local cache of Keycloak users — source of truth is Keycloak
      changes:
        - createTable:
            tableName: users
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: uuid
                  type: VARCHAR(36)
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    unique: true
                    nullable: false
              - column:
                  name: tenant_id
                  type: BIGINT
                  constraints:
                    foreignKeyName: fk_users_tenant
                    references: tenants(id)
              - column:
                  name: keycloak_user_id
                  type: VARCHAR(36)
                  constraints:
                    unique: true
                    nullable: false
              - column:
                  name: email
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: first_name
                  type: VARCHAR(100)
              - column:
                  name: last_name
                  type: VARCHAR(100)
              - column:
                  name: role
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: title
                  type: VARCHAR(50)
              - column:
                  name: specialty
                  type: VARCHAR(100)
              - column:
                  name: npi
                  type: VARCHAR(20)
              - column:
                  name: dea_number
                  type: VARCHAR(20)
              - column:
                  name: provider_id
                  type: VARCHAR(36)
              - column:
                  name: phone
                  type: VARCHAR(20)
              - column:
                  name: status
                  type: VARCHAR(50)
                  defaultValue: ACTIVE
              - column:
                  name: last_login_at
                  type: TIMESTAMP
              - column:
                  name: created_by
                  type: VARCHAR(255)
              - column:
                  name: modified_by
                  type: VARCHAR(255)
              - column:
                  name: created
                  type: TIMESTAMP
                  defaultValueComputed: now()
              - column:
                  name: modified
                  type: TIMESTAMP
                  defaultValueComputed: now()
              - column:
                  name: archive
                  type: BOOLEAN
                  defaultValueBoolean: false

  - changeSet:
      id: 002-users-unique-email-per-tenant
      author: primus
      changes:
        - addUniqueConstraint:
            tableName: users
            columnNames: tenant_id, email
            constraintName: uq_users_tenant_email
