databaseChangeLog:

  # ── 1. care_plans ─────────────────────────────────────────────────────────────
  - changeSet:
      id: 015-create-care-plans
      author: primus
      comment: Patient-level care plans created and managed by the care team
      changes:
        - createTable:
            tableName: care_plans
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: uuid
                  type: VARCHAR(36)
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    unique: true
                    nullable: false
              - column:
                  name: tenant_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_care_plans_tenant
                    references: tenants(id)
              - column:
                  name: patient_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_care_plans_patient
                    references: patients(id)
              - column:
                  name: title
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: TEXT
              - column:
                  name: status
                  type: VARCHAR(20)
                  defaultValue: ACTIVE
              - column:
                  name: start_date
                  type: DATE
                  constraints:
                    nullable: false
              - column:
                  name: end_date
                  type: DATE
              - column:
                  name: created_by_provider
                  type: VARCHAR(36)
              - column:
                  name: created_by
                  type: VARCHAR(255)
              - column:
                  name: modified_by
                  type: VARCHAR(255)
              - column:
                  name: created
                  type: TIMESTAMP
                  defaultValueComputed: now()
              - column:
                  name: modified
                  type: TIMESTAMP
                  defaultValueComputed: now()
              - column:
                  name: archive
                  type: BOOLEAN
                  defaultValueBoolean: false
                  constraints:
                    nullable: false

  - changeSet:
      id: 015-care-plans-indexes
      author: primus
      comment: Indexes for care plan lookup by patient and tenant
      changes:
        - createIndex:
            tableName: care_plans
            indexName: idx_care_plans_patient_id
            columns:
              - column:
                  name: patient_id
        - createIndex:
            tableName: care_plans
            indexName: idx_care_plans_tenant_id
            columns:
              - column:
                  name: tenant_id

  # ── 2. care_plan_goals ────────────────────────────────────────────────────────
  - changeSet:
      id: 015-create-care-plan-goals
      author: primus
      comment: Measurable goals within a care plan
      changes:
        - createTable:
            tableName: care_plan_goals
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: uuid
                  type: VARCHAR(36)
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    unique: true
                    nullable: false
              - column:
                  name: tenant_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_care_goals_tenant
                    references: tenants(id)
              - column:
                  name: care_plan_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_care_goals_plan
                    references: care_plans(id)
              - column:
                  name: description
                  type: VARCHAR(500)
                  constraints:
                    nullable: false
              - column:
                  name: target_value
                  type: VARCHAR(100)
              - column:
                  name: current_value
                  type: VARCHAR(100)
              - column:
                  name: target_date
                  type: DATE
              - column:
                  name: status
                  type: VARCHAR(20)
                  defaultValue: IN_PROGRESS
              - column:
                  name: created_by
                  type: VARCHAR(255)
              - column:
                  name: modified_by
                  type: VARCHAR(255)
              - column:
                  name: created
                  type: TIMESTAMP
                  defaultValueComputed: now()
              - column:
                  name: modified
                  type: TIMESTAMP
                  defaultValueComputed: now()
              - column:
                  name: archive
                  type: BOOLEAN
                  defaultValueBoolean: false
                  constraints:
                    nullable: false

  - changeSet:
      id: 015-care-plan-goals-indexes
      author: primus
      comment: Index for goal lookup by care plan
      changes:
        - createIndex:
            tableName: care_plan_goals
            indexName: idx_care_goals_plan_id
            columns:
              - column:
                  name: care_plan_id

  # ── 3. care_plan_activities ───────────────────────────────────────────────────
  - changeSet:
      id: 015-create-care-plan-activities
      author: primus
      comment: Actionable activities assigned to care plan goals
      changes:
        - createTable:
            tableName: care_plan_activities
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: uuid
                  type: VARCHAR(36)
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    unique: true
                    nullable: false
              - column:
                  name: tenant_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_care_activities_tenant
                    references: tenants(id)
              - column:
                  name: goal_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_care_activities_goal
                    references: care_plan_goals(id)
              - column:
                  name: description
                  type: VARCHAR(500)
                  constraints:
                    nullable: false
              - column:
                  name: frequency
                  type: VARCHAR(100)
              - column:
                  name: assigned_to
                  type: VARCHAR(36)
              - column:
                  name: status
                  type: VARCHAR(20)
                  defaultValue: PENDING
              - column:
                  name: due_date
                  type: DATE
              - column:
                  name: completed_date
                  type: DATE
              - column:
                  name: created_by
                  type: VARCHAR(255)
              - column:
                  name: modified_by
                  type: VARCHAR(255)
              - column:
                  name: created
                  type: TIMESTAMP
                  defaultValueComputed: now()
              - column:
                  name: modified
                  type: TIMESTAMP
                  defaultValueComputed: now()
              - column:
                  name: archive
                  type: BOOLEAN
                  defaultValueBoolean: false
                  constraints:
                    nullable: false

  - changeSet:
      id: 015-care-plan-activities-indexes
      author: primus
      comment: Index for activity lookup by goal
      changes:
        - createIndex:
            tableName: care_plan_activities
            indexName: idx_care_activities_goal_id
            columns:
              - column:
                  name: goal_id

  # ── 4. questionnaire_definitions ──────────────────────────────────────────────
  - changeSet:
      id: 015-create-questionnaire-definitions
      author: primus
      comment: Structured questionnaire definitions (PHQ-9, GAD-7, AUDIT, custom)
      changes:
        - createTable:
            tableName: questionnaire_definitions
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: uuid
                  type: VARCHAR(36)
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    unique: true
                    nullable: false
              - column:
                  name: tenant_id
                  type: BIGINT
                  constraints:
                    foreignKeyName: fk_questionnaire_def_tenant
                    references: tenants(id)
              - column:
                  name: name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: TEXT
              - column:
                  name: category
                  type: VARCHAR(50)
              - column:
                  name: questions
                  type: JSONB
                  constraints:
                    nullable: false
              - column:
                  name: scoring_logic
                  type: JSONB
              - column:
                  name: is_published
                  type: BOOLEAN
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
              - column:
                  name: created_by
                  type: VARCHAR(255)
              - column:
                  name: modified_by
                  type: VARCHAR(255)
              - column:
                  name: created
                  type: TIMESTAMP
                  defaultValueComputed: now()
              - column:
                  name: modified
                  type: TIMESTAMP
                  defaultValueComputed: now()
              - column:
                  name: archive
                  type: BOOLEAN
                  defaultValueBoolean: false
                  constraints:
                    nullable: false

  - changeSet:
      id: 015-questionnaire-definitions-indexes
      author: primus
      comment: Index for questionnaire lookup by tenant
      changes:
        - createIndex:
            tableName: questionnaire_definitions
            indexName: idx_questionnaire_def_tenant_id
            columns:
              - column:
                  name: tenant_id

  # ── 5. questionnaire_responses ────────────────────────────────────────────────
  - changeSet:
      id: 015-create-questionnaire-responses
      author: primus
      comment: Patient responses to a submitted questionnaire, linked to encounter when applicable
      changes:
        - createTable:
            tableName: questionnaire_responses
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: uuid
                  type: VARCHAR(36)
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    unique: true
                    nullable: false
              - column:
                  name: tenant_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_questionnaire_resp_tenant
                    references: tenants(id)
              - column:
                  name: questionnaire_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_questionnaire_resp_def
                    references: questionnaire_definitions(id)
              - column:
                  name: patient_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_questionnaire_resp_patient
                    references: patients(id)
              - column:
                  name: encounter_id
                  type: BIGINT
                  constraints:
                    foreignKeyName: fk_questionnaire_resp_encounter
                    references: encounters(id)
              - column:
                  name: responses
                  type: JSONB
                  constraints:
                    nullable: false
              - column:
                  name: total_score
                  type: INTEGER
              - column:
                  name: risk_level
                  type: VARCHAR(20)
              - column:
                  name: completed_by
                  type: VARCHAR(36)
              - column:
                  name: completed_at
                  type: TIMESTAMP
              - column:
                  name: created_by
                  type: VARCHAR(255)
              - column:
                  name: modified_by
                  type: VARCHAR(255)
              - column:
                  name: created
                  type: TIMESTAMP
                  defaultValueComputed: now()
              - column:
                  name: modified
                  type: TIMESTAMP
                  defaultValueComputed: now()
              - column:
                  name: archive
                  type: BOOLEAN
                  defaultValueBoolean: false
                  constraints:
                    nullable: false

  - changeSet:
      id: 015-questionnaire-responses-indexes
      author: primus
      comment: Indexes for response lookup by patient and questionnaire
      changes:
        - createIndex:
            tableName: questionnaire_responses
            indexName: idx_questionnaire_resp_patient_id
            columns:
              - column:
                  name: patient_id
        - createIndex:
            tableName: questionnaire_responses
            indexName: idx_questionnaire_resp_questionnaire_id
            columns:
              - column:
                  name: questionnaire_id
