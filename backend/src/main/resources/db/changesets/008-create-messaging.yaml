databaseChangeLog:
  - changeSet:
      id: 008-create-message-threads
      author: primus
      changes:
        - createTable:
            tableName: message_threads
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: uuid
                  type: VARCHAR(36)
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    unique: true
                    nullable: false
              - column:
                  name: tenant_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_message_threads_tenant
                    references: tenants(id)
              - column:
                  name: subject
                  type: VARCHAR(500)
              - column:
                  name: type
                  type: VARCHAR(50)
              - column:
                  name: last_message_at
                  type: TIMESTAMP
              - column:
                  name: last_message_text
                  type: VARCHAR(500)
              - column:
                  name: created_by
                  type: VARCHAR(255)
              - column:
                  name: modified_by
                  type: VARCHAR(255)
              - column:
                  name: created
                  type: TIMESTAMP
                  defaultValueComputed: now()
              - column:
                  name: modified
                  type: TIMESTAMP
                  defaultValueComputed: now()
              - column:
                  name: archive
                  type: BOOLEAN
                  defaultValueBoolean: false

  - changeSet:
      id: 008-create-messages
      author: primus
      changes:
        - createTable:
            tableName: messages
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: uuid
                  type: VARCHAR(36)
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    unique: true
                    nullable: false
              - column:
                  name: tenant_id
                  type: BIGINT
                  constraints:
                    foreignKeyName: fk_messages_tenant
                    references: tenants(id)
              - column:
                  name: thread_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_messages_thread
                    references: message_threads(id)
              - column:
                  name: sender_user_id
                  type: BIGINT
                  constraints:
                    foreignKeyName: fk_messages_sender
                    references: users(id)
              - column:
                  name: sender_name
                  type: VARCHAR(255)
              - column:
                  name: sender_role
                  type: VARCHAR(50)
              - column:
                  name: body
                  type: TEXT
              - column:
                  name: sent_at
                  type: TIMESTAMP
                  defaultValueComputed: now()
              - column:
                  name: read_at
                  type: TIMESTAMP
              - column:
                  name: has_attachment
                  type: BOOLEAN
                  defaultValueBoolean: false
              - column:
                  name: created_by
                  type: VARCHAR(255)
              - column:
                  name: modified_by
                  type: VARCHAR(255)
              - column:
                  name: created
                  type: TIMESTAMP
                  defaultValueComputed: now()
              - column:
                  name: modified
                  type: TIMESTAMP
                  defaultValueComputed: now()
              - column:
                  name: archive
                  type: BOOLEAN
                  defaultValueBoolean: false

  - changeSet:
      id: 008-messages-index
      author: primus
      changes:
        - createIndex:
            tableName: messages
            indexName: idx_messages_thread_sent_at
            columns:
              - column:
                  name: thread_id
              - column:
                  name: sent_at

  - changeSet:
      id: 008-create-thread-participants
      author: primus
      changes:
        - createTable:
            tableName: thread_participants
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: uuid
                  type: VARCHAR(36)
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    unique: true
                    nullable: false
              - column:
                  name: tenant_id
                  type: BIGINT
                  constraints:
                    foreignKeyName: fk_thread_participants_tenant
                    references: tenants(id)
              - column:
                  name: thread_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_thread_participants_thread
                    references: message_threads(id)
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_thread_participants_user
                    references: users(id)
              - column:
                  name: unread_count
                  type: INT
                  defaultValueNumeric: 0
              - column:
                  name: created_by
                  type: VARCHAR(255)
              - column:
                  name: modified_by
                  type: VARCHAR(255)
              - column:
                  name: created
                  type: TIMESTAMP
                  defaultValueComputed: now()
              - column:
                  name: modified
                  type: TIMESTAMP
                  defaultValueComputed: now()
              - column:
                  name: archive
                  type: BOOLEAN
                  defaultValueBoolean: false

  - changeSet:
