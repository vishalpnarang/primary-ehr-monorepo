              - column:
                  name: tenant_id
                  type: BIGINT
                  constraints:
                    foreignKeyName: fk_notifications_tenant
                    references: tenants(id)
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_notifications_user
                    references: users(id)
              - column:
                  name: type
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: title
                  type: VARCHAR(255)
              - column:
                  name: body
                  type: TEXT
              - column:
                  name: read
                  type: BOOLEAN
                  defaultValueBoolean: false
              - column:
                  name: action_url
                  type: VARCHAR(1024)
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: now()
              - column:
                  name: created_by
                  type: VARCHAR(255)
              - column:
                  name: modified_by
                  type: VARCHAR(255)
              - column:
                  name: created
                  type: TIMESTAMP
                  defaultValueComputed: now()
              - column:
                  name: modified
                  type: TIMESTAMP
                  defaultValueComputed: now()
              - column:
                  name: archive
                  type: BOOLEAN
                  defaultValueBoolean: false

  - changeSet:
      id: 008-notifications-index
      author: primus
      changes:
        - createIndex:
            tableName: notifications
            indexName: idx_notifications_user_read
            columns:
              - column:
                  name: user_id
              - column:
                  name: read

  - changeSet:
      id: 008-create-inbox-items
      author: primus
      changes:
        - createTable:
            tableName: inbox_items
            columns:
              - column:
                  name: id
