databaseChangeLog:
  - changeSet:
      id: 020-create-saved-payment-methods
      author: primus
      comment: Saved Stripe payment methods per patient — cards and bank accounts
      changes:
        - createTable:
            tableName: saved_payment_methods
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: uuid
                  type: VARCHAR(36)
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    unique: true
                    nullable: false
              - column:
                  name: tenant_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_saved_payment_methods_tenant
                    references: tenants(id)
              - column:
                  name: patient_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_saved_payment_methods_patient
                    references: patients(id)
              - column:
                  name: method_type
                  type: VARCHAR(20)
                  constraints:
                    nullable: false
              - column:
                  name: last_four
                  type: VARCHAR(4)
              - column:
                  name: brand
                  type: VARCHAR(20)
              - column:
                  name: exp_month
                  type: INTEGER
              - column:
                  name: exp_year
                  type: INTEGER
              - column:
                  name: is_default
                  type: BOOLEAN
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
              - column:
                  name: stripe_payment_method_id
                  type: VARCHAR(255)
              - column:
                  name: created_by
                  type: VARCHAR(255)
              - column:
                  name: modified_by
                  type: VARCHAR(255)
              - column:
                  name: created
                  type: TIMESTAMP
                  defaultValueComputed: now()
              - column:
                  name: modified
                  type: TIMESTAMP
                  defaultValueComputed: now()
              - column:
                  name: archive
                  type: BOOLEAN
                  defaultValueBoolean: false

  - changeSet:
      id: 020-saved-payment-methods-index
      author: primus
      comment: Index for payment method lookup by patient
      changes:
        - createIndex:
            tableName: saved_payment_methods
            indexName: idx_saved_payment_methods_patient
            columns:
              - column:
                  name: patient_id
              - column:
                  name: tenant_id

  - changeSet:
      id: 020-create-payment-transactions
      author: primus
      comment: Payment transactions — records every payment made against an invoice
      changes:
        - createTable:
            tableName: payment_transactions
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: uuid
                  type: VARCHAR(36)
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    unique: true
                    nullable: false
              - column:
                  name: tenant_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_payment_transactions_tenant
                    references: tenants(id)
              - column:
                  name: invoice_id
                  type: BIGINT
                  constraints:
                    foreignKeyName: fk_payment_transactions_invoice
                    references: invoices(id)
              - column:
                  name: patient_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_payment_transactions_patient
                    references: patients(id)
              - column:
                  name: amount
                  type: DECIMAL(12,2)
                  constraints:
                    nullable: false
              - column:
                  name: method
                  type: VARCHAR(20)
                  constraints:
                    nullable: false
              - column:
                  name: reference_number
                  type: VARCHAR(255)
              - column:
                  name: stripe_payment_intent_id
                  type: VARCHAR(255)
              - column:
                  name: status
                  type: VARCHAR(20)
                  defaultValue: COMPLETED
                  constraints:
                    nullable: false
              - column:
                  name: notes
                  type: TEXT
              - column:
                  name: created_by
                  type: VARCHAR(255)
              - column:
                  name: modified_by
                  type: VARCHAR(255)
              - column:
                  name: created
                  type: TIMESTAMP
                  defaultValueComputed: now()
              - column:
                  name: modified
                  type: TIMESTAMP
                  defaultValueComputed: now()
              - column:
                  name: archive
                  type: BOOLEAN
                  defaultValueBoolean: false

  - changeSet:
      id: 020-payment-transactions-index
      author: primus
      comment: Indexes for payment history lookup
      changes:
        - createIndex:
            tableName: payment_transactions
            indexName: idx_payment_transactions_patient_tenant
            columns:
              - column:
                  name: patient_id
              - column:
                  name: tenant_id
        - createIndex:
            tableName: payment_transactions
            indexName: idx_payment_transactions_invoice_id
            columns:
              - column:
                  name: invoice_id

  - changeSet:
      id: 020-create-scheduled-payments
      author: primus
      comment: Scheduled future payments — payment plans for outstanding balances
      changes:
        - createTable:
            tableName: scheduled_payments
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: uuid
                  type: VARCHAR(36)
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    unique: true
                    nullable: false
              - column:
                  name: tenant_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_scheduled_payments_tenant
                    references: tenants(id)
              - column:
                  name: patient_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_scheduled_payments_patient
                    references: patients(id)
              - column:
                  name: invoice_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_scheduled_payments_invoice
                    references: invoices(id)
              - column:
                  name: payment_method_id
                  type: BIGINT
                  constraints:
                    foreignKeyName: fk_scheduled_payments_method
                    references: saved_payment_methods(id)
              - column:
                  name: amount
                  type: DECIMAL(12,2)
                  constraints:
                    nullable: false
              - column:
                  name: scheduled_date
                  type: DATE
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: VARCHAR(20)
                  defaultValue: SCHEDULED
                  constraints:
                    nullable: false
              - column:
                  name: created_by
                  type: VARCHAR(255)
              - column:
                  name: modified_by
                  type: VARCHAR(255)
              - column:
                  name: created
                  type: TIMESTAMP
                  defaultValueComputed: now()
              - column:
                  name: modified
                  type: TIMESTAMP
                  defaultValueComputed: now()
              - column:
                  name: archive
                  type: BOOLEAN
                  defaultValueBoolean: false

  - changeSet:
      id: 020-create-credits
      author: primus
      comment: Patient credit balances — overpayments, adjustments, refunds
      changes:
        - createTable:
            tableName: credits
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: uuid
                  type: VARCHAR(36)
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    unique: true
                    nullable: false
              - column:
                  name: tenant_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_credits_tenant
                    references: tenants(id)
              - column:
                  name: patient_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_credits_patient
                    references: patients(id)
              - column:
                  name: amount
                  type: DECIMAL(12,2)
                  constraints:
                    nullable: false
              - column:
                  name: reason
                  type: VARCHAR(500)
              - column:
                  name: type
                  type: VARCHAR(20)
              - column:
                  name: applied_to_invoice_id
                  type: BIGINT
                  constraints:
                    foreignKeyName: fk_credits_invoice
                    references: invoices(id)
              - column:
                  name: status
                  type: VARCHAR(20)
                  defaultValue: AVAILABLE
                  constraints:
                    nullable: false
              - column:
                  name: created_by
                  type: VARCHAR(255)
              - column:
                  name: modified_by
                  type: VARCHAR(255)
              - column:
                  name: created
                  type: TIMESTAMP
                  defaultValueComputed: now()
              - column:
                  name: modified
                  type: TIMESTAMP
                  defaultValueComputed: now()
              - column:
                  name: archive
                  type: BOOLEAN
                  defaultValueBoolean: false

  - changeSet:
      id: 020-credits-index
      author: primus
      comment: Index for credit lookup by patient
      changes:
        - createIndex:
            tableName: credits
            indexName: idx_credits_patient_tenant
            columns:
              - column:
                  name: patient_id
              - column:
                  name: tenant_id
