databaseChangeLog:
  - changeSet:
      id: 005-create-encounters
      author: primus
      changes:
        - createTable:
            tableName: encounters
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: uuid
                  type: VARCHAR(36)
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    unique: true
                    nullable: false
              - column:
                  name: tenant_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_encounters_tenant
                    references: tenants(id)
              - column:
                  name: patient_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_encounters_patient
                    references: patients(id)
              - column:
                  name: provider_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_encounters_provider
                    references: users(id)
              - column:
                  name: appointment_id
                  type: BIGINT
                  constraints:
                    foreignKeyName: fk_encounters_appointment
                    references: appointments(id)
              - column:
                  name: date
                  type: DATE
                  constraints:
                    nullable: false
              - column:
                  name: type
                  type: VARCHAR(100)
              - column:
                  name: status
                  type: VARCHAR(50)
                  defaultValue: OPEN
              - column:
                  name: chief_complaint
                  type: TEXT
              - column:
                  name: hpi_text
                  type: TEXT
              - column:
                  name: examination
                  type: TEXT
              - column:
                  name: ros_data
                  type: JSONB
              - column:
                  name: em_code
                  type: VARCHAR(20)
              - column:
                  name: em_level
                  type: INT
              - column:
                  name: signed_at
                  type: TIMESTAMP
              - column:
                  name: signed_by
                  type: VARCHAR(255)
              - column:
                  name: created_by
                  type: VARCHAR(255)
              - column:
                  name: modified_by
                  type: VARCHAR(255)
              - column:
                  name: created
                  type: TIMESTAMP
                  defaultValueComputed: now()
              - column:
                  name: modified
                  type: TIMESTAMP
                  defaultValueComputed: now()
              - column:
                  name: archive
                  type: BOOLEAN
                  defaultValueBoolean: false

  - changeSet:
      id: 005-encounters-indexes
      author: primus
      changes:
        - createIndex:
            tableName: encounters
            indexName: idx_encounters_tenant_patient
            columns:
              - column:
                  name: tenant_id
              - column:
                  name: patient_id
        - createIndex:
            tableName: encounters
            indexName: idx_encounters_tenant_date
            columns:
              - column:
                  name: tenant_id
              - column:
                  name: date

  - changeSet:
      id: 005-create-assessment-plans
      author: primus
      changes:
        - createTable:
            tableName: assessment_plans
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: uuid
                  type: VARCHAR(36)
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    unique: true
                    nullable: false
              - column:
                  name: tenant_id
                  type: BIGINT
                  constraints:
                    foreignKeyName: fk_assessment_plans_tenant
                    references: tenants(id)
              - column:
                  name: encounter_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_assessment_plans_encounter
                    references: encounters(id)
              - column:
                  name: diagnosis
                  type: VARCHAR(500)
                  constraints:
                    nullable: false
              - column:
                  name: icd_code
                  type: VARCHAR(20)
              - column:
                  name: plan
                  type: TEXT
              - column:
                  name: sort_order
                  type: INT
                  defaultValueNumeric: 0
              - column:
                  name: created_by
                  type: VARCHAR(255)
              - column:
                  name: modified_by
                  type: VARCHAR(255)
              - column:
                  name: created
                  type: TIMESTAMP
                  defaultValueComputed: now()
              - column:
                  name: modified
                  type: TIMESTAMP
                  defaultValueComputed: now()
              - column:
                  name: archive
                  type: BOOLEAN
                  defaultValueBoolean: false

  - changeSet:
      id: 005-create-smart-phrases
      author: primus
      changes:
        - createTable:
            tableName: smart_phrases
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: uuid
                  type: VARCHAR(36)
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    unique: true
                    nullable: false
              - column:
                  name: tenant_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_smart_phrases_tenant
                    references: tenants(id)
              - column:
                  name: trigger
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: expansion
                  type: TEXT
                  constraints:
                    nullable: false
              - column:
                  name: category
                  type: VARCHAR(100)
              - column:
                  name: created_by_user_id
                  type: BIGINT
                  constraints:
                    foreignKeyName: fk_smart_phrases_user
                    references: users(id)
              - column:
                  name: created_by
                  type: VARCHAR(255)
              - column:
                  name: modified_by
                  type: VARCHAR(255)
              - column:
                  name: created
                  type: TIMESTAMP
                  defaultValueComputed: now()
              - column:
                  name: modified
                  type: TIMESTAMP
                  defaultValueComputed: now()
              - column:
                  name: archive
                  type: BOOLEAN
                  defaultValueBoolean: false

  - changeSet:
      id: 005-vital-signs-encounter-fk
      author: primus
      comment: Add FK from vital_signs.encounter_id to encounters now that encounters table exists
      changes:
        - addForeignKeyConstraint:
            baseTableName: vital_signs
            baseColumnNames: encounter_id
            constraintName: fk_vital_signs_encounter
            referencedTableName: encounters
            referencedColumnNames: id
