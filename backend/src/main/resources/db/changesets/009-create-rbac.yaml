databaseChangeLog:
  - changeSet:
      id: 009-create-roles
      author: primus
      comment: Tenant-scoped roles — each tenant defines its own role set
      changes:
        - createTable:
            tableName: roles
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: uuid
                  type: VARCHAR(36)
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    unique: true
                    nullable: false
              - column:
                  name: tenant_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_roles_tenant
                    references: tenants(id)
              - column:
                  name: name
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: VARCHAR(500)
              - column:
                  name: is_system
                  type: BOOLEAN
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: VARCHAR(20)
                  defaultValue: ACTIVE
              - column:
                  name: created_by
                  type: VARCHAR(255)
              - column:
                  name: modified_by
                  type: VARCHAR(255)
              - column:
                  name: created
                  type: TIMESTAMP
                  defaultValueComputed: now()
              - column:
                  name: modified
                  type: TIMESTAMP
                  defaultValueComputed: now()
              - column:
                  name: archive
                  type: BOOLEAN
                  defaultValueBoolean: false

  - changeSet:
      id: 009-roles-unique-constraint
      author: primus
      comment: A role name must be unique within a tenant
      changes:
        - addUniqueConstraint:
            tableName: roles
            columnNames: tenant_id, name
            constraintName: uq_role_tenant_name

  - changeSet:
      id: 009-create-permissions
      author: primus
      comment: Global permissions — not tenant-scoped; shared across the platform
      changes:
        - createTable:
            tableName: permissions
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: uuid
                  type: VARCHAR(36)
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    unique: true
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: description
                  type: VARCHAR(500)
              - column:
                  name: module
                  type: VARCHAR(100)
              - column:
                  name: action
                  type: VARCHAR(50)
              - column:
                  name: created_by
                  type: VARCHAR(255)
              - column:
                  name: modified_by
                  type: VARCHAR(255)
              - column:
                  name: created
                  type: TIMESTAMP
                  defaultValueComputed: now()
              - column:
                  name: modified
                  type: TIMESTAMP
                  defaultValueComputed: now()
              - column:
                  name: archive
                  type: BOOLEAN
                  defaultValueBoolean: false

  - changeSet:
      id: 009-create-role-permissions
      author: primus
      comment: Many-to-many join between roles and permissions; inherits tenant from role
      changes:
        - createTable:
            tableName: role_permissions
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: uuid
                  type: VARCHAR(36)
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    unique: true
                    nullable: false
              - column:
                  name: role_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_role_permissions_role
                    references: roles(id)
              - column:
                  name: permission_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_role_permissions_permission
                    references: permissions(id)
              - column:
                  name: created_by
                  type: VARCHAR(255)
              - column:
                  name: modified_by
                  type: VARCHAR(255)
              - column:
                  name: created
                  type: TIMESTAMP
                  defaultValueComputed: now()
              - column:
                  name: modified
                  type: TIMESTAMP
                  defaultValueComputed: now()
              - column:
                  name: archive
                  type: BOOLEAN
                  defaultValueBoolean: false

  - changeSet:
      id: 009-role-permissions-unique-constraint
      author: primus
      comment: A permission can only be assigned to a role once
      changes:
        - addUniqueConstraint:
            tableName: role_permissions
            columnNames: role_id, permission_id
            constraintName: uq_role_permission

  - changeSet:
      id: 009-role-permissions-indexes
      author: primus
      comment: Indexes to speed up permission lookups by role and permission
      changes:
        - createIndex:
            tableName: role_permissions
            indexName: idx_role_permissions_role_id
            columns:
              - column:
                  name: role_id
        - createIndex:
            tableName: role_permissions
            indexName: idx_role_permissions_permission_id
            columns:
              - column:
                  name: permission_id

  - changeSet:
      id: 009-create-features
      author: primus
      comment: Tenant-level feature flags for module-level enable/disable toggles
      changes:
        - createTable:
            tableName: features
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: uuid
                  type: VARCHAR(36)
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    unique: true
                    nullable: false
              - column:
                  name: tenant_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_features_tenant
                    references: tenants(id)
              - column:
                  name: name
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: enabled
                  type: BOOLEAN
                  defaultValueBoolean: true
                  constraints:
                    nullable: false
              - column:
                  name: module
                  type: VARCHAR(100)
              - column:
                  name: created_by
                  type: VARCHAR(255)
              - column:
                  name: modified_by
                  type: VARCHAR(255)
              - column:
                  name: created
                  type: TIMESTAMP
                  defaultValueComputed: now()
              - column:
                  name: modified
                  type: TIMESTAMP
                  defaultValueComputed: now()
              - column:
                  name: archive
                  type: BOOLEAN
                  defaultValueBoolean: false

  - changeSet:
      id: 009-features-unique-constraint
      author: primus
      comment: A feature name must be unique within a tenant
      changes:
        - addUniqueConstraint:
            tableName: features
            columnNames: tenant_id, name
            constraintName: uq_feature_tenant_name
