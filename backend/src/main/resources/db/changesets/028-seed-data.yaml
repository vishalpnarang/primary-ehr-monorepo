  - changeSet:
      id: 028-seed-macros
      author: primus
      comment: 3 smart-phrase macros for common documentation patterns
      changes:
        - sql:
            sql: |
              DO $$
              DECLARE
                v_tenant_id BIGINT;
              BEGIN
                SELECT id INTO v_tenant_id FROM tenants WHERE subdomain = 'primusdemo';
                IF v_tenant_id IS NULL THEN RETURN; END IF;

                INSERT INTO macros
                  (tenant_id, name, abbreviation, expansion, category, is_shared, created_by, modified_by)
                VALUES
                  (v_tenant_id,
                   'Hypertension Management',
                   '.htn',
                   'Patient has a history of hypertension, currently managed with [MEDICATION]. Blood pressure today is [BP]. Patient reports [SYMPTOMS]. Counseled on low-sodium diet, regular aerobic exercise, and medication adherence. Plan: [PLAN].',
                   'chronic_disease', true, 'system', 'system'),
                  (v_tenant_id,
                   'Type 2 Diabetes Management',
                   '.dm2',
                   'Type 2 Diabetes Mellitus, HbA1c [VALUE]% (last checked [DATE]). Patient is [ADHERENT/NON-ADHERENT] with medications. Reports [SYMPTOMS]. SMBG: [READINGS]. Reviewed diet and physical activity. Plan: [PLAN]. Recheck HbA1c in [INTERVAL].',
                   'chronic_disease', true, 'system', 'system'),
                  (v_tenant_id,
                   'Annual Wellness Visit',
                   '.wellvisit',
                   'Annual wellness visit. Patient appears [well/unwell] and is in [no/mild/moderate] distress. Reviewed preventive care measures including immunizations, cancer screenings, and cardiovascular risk. Social history and functional status reviewed. Advance directives discussed. Personalized health plan provided.',
                   'wellness', true, 'system', 'system')
                ON CONFLICT ON CONSTRAINT uq_macros_tenant_abbreviation DO NOTHING;
              END $$;

  - changeSet:
      id: 028-seed-soap-note-templates
      author: primus
      comment: 2 SOAP note templates — H&P and Progress Note
      changes:
        - sql:
            sql: |
              DO $$
              DECLARE
                v_tenant_id BIGINT;
              BEGIN
                SELECT id INTO v_tenant_id FROM tenants WHERE subdomain = 'primusdemo';
                IF v_tenant_id IS NULL THEN RETURN; END IF;

                INSERT INTO soap_note_templates
                  (tenant_id, name, category, subjective_template, objective_template,
                   assessment_template, plan_template, is_default, created_by, modified_by)
                VALUES
                  (v_tenant_id,
                   'History & Physical (H&P)',
                   'H&P',
                   'Chief Complaint: [CC]

HPI: [PATIENT NAME] is a [AGE]-year-old [SEX] who presents for [REASON]. [History of present illness with onset, duration, character, associated symptoms, modifying factors, and relevant context.]

Past Medical History: [PMH]
Past Surgical History: [PSH]
Medications: [MED LIST]
Allergies: [ALLERGIES]
Family History: [FH]
Social History: [SH]
Review of Systems: [ROS]',
                   'Vital Signs: BP [BP], HR [HR], RR [RR], Temp [TEMP], O2 Sat [O2]%, Weight [WT] lbs, BMI [BMI]

General: [Alert/oriented, in no acute distress]
HEENT: [WNL/findings]
Cardiovascular: [RRR, no murmurs/findings]
Pulmonary: [CTAB/findings]
Abdomen: [Soft, NT, ND/findings]
Extremities: [No edema/findings]
Neurological: [A&Ox3/findings]',
                   '[ASSESSMENT — numbered problem list with ICD-10 codes]
1. [Problem 1] — [ICD code]
2. [Problem 2] — [ICD code]',
                   '[PLAN — numbered to match assessment]
1. [Plan for Problem 1]: [medications, orders, referrals, counseling]
2. [Plan for Problem 2]: [medications, orders, referrals, counseling]

Follow-up: [INTERVAL]
Patient education provided: [TOPICS]
Return precautions discussed.',
                   true, 'system', 'system'),
                  (v_tenant_id,
                   'Progress Note (SOAP)',
                   'SOAP',
                   'Chief Complaint: [CC]

S: Patient presents for [REASON]. [Brief HPI — interval history since last visit, symptom changes, medication tolerance, adherence.]',
                   'O: Vitals: BP [BP], HR [HR], Temp [TEMP], O2 [O2]%, Wt [WT] lbs
Exam: [Pertinent physical findings]',
                   'A:
1. [Primary diagnosis] — [ICD code] — [stable/improving/worsening]
2. [Secondary diagnosis] — [ICD code]',
                   'P:
1. [Medication changes / refills]
2. [Orders placed]
3. [Referrals]
4. [Patient education]

Return in [INTERVAL] or sooner if [SYMPTOMS].',
                   false, 'system', 'system')
                ON CONFLICT DO NOTHING;
              END $$;

