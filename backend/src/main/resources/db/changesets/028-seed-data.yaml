  - changeSet:
      id: 028-seed-questionnaire-definitions
      author: primus
      comment: 3 validated clinical questionnaires — PHQ-9, GAD-7, AUDIT
      changes:
        - sql:
            sql: |
              DO $$
              DECLARE
                v_tenant_id BIGINT;
              BEGIN
                SELECT id INTO v_tenant_id FROM tenants WHERE subdomain = 'primusdemo';
                IF v_tenant_id IS NULL THEN RETURN; END IF;

                INSERT INTO questionnaire_definitions
                  (tenant_id, name, description, category, questions, scoring_logic,
                   is_published, created_by, modified_by)
                VALUES
                  (v_tenant_id,
                   'PHQ-9 Depression Scale',
                   'Patient Health Questionnaire-9 — validated 9-item depression screening tool. Score 0-27. Used for depression screening and monitoring.',
                   'mental_health',
                   '[
                     {"id": 1, "text": "Little interest or pleasure in doing things?", "type": "scale", "options": ["Not at all (0)", "Several days (1)", "More than half the days (2)", "Nearly every day (3)"]},
                     {"id": 2, "text": "Feeling down, depressed, or hopeless?", "type": "scale", "options": ["Not at all (0)", "Several days (1)", "More than half the days (2)", "Nearly every day (3)"]},
                     {"id": 3, "text": "Trouble falling or staying asleep, or sleeping too much?", "type": "scale", "options": ["Not at all (0)", "Several days (1)", "More than half the days (2)", "Nearly every day (3)"]},
                     {"id": 4, "text": "Feeling tired or having little energy?", "type": "scale", "options": ["Not at all (0)", "Several days (1)", "More than half the days (2)", "Nearly every day (3)"]},
                     {"id": 5, "text": "Poor appetite or overeating?", "type": "scale", "options": ["Not at all (0)", "Several days (1)", "More than half the days (2)", "Nearly every day (3)"]},
                     {"id": 6, "text": "Feeling bad about yourself — or that you are a failure or have let yourself or your family down?", "type": "scale", "options": ["Not at all (0)", "Several days (1)", "More than half the days (2)", "Nearly every day (3)"]},
                     {"id": 7, "text": "Trouble concentrating on things, such as reading the newspaper or watching television?", "type": "scale", "options": ["Not at all (0)", "Several days (1)", "More than half the days (2)", "Nearly every day (3)"]},
                     {"id": 8, "text": "Moving or speaking so slowly that other people could have noticed? Or so fidgety or restless that you have been moving a lot more than usual?", "type": "scale", "options": ["Not at all (0)", "Several days (1)", "More than half the days (2)", "Nearly every day (3)"]},
                     {"id": 9, "text": "Thoughts that you would be better off dead, or thoughts of hurting yourself in some way?", "type": "scale", "options": ["Not at all (0)", "Several days (1)", "More than half the days (2)", "Nearly every day (3)"]}
                   ]',
                   '{"ranges": [{"min": 0, "max": 4, "label": "Minimal depression"}, {"min": 5, "max": 9, "label": "Mild depression"}, {"min": 10, "max": 14, "label": "Moderate depression"}, {"min": 15, "max": 19, "label": "Moderately severe depression"}, {"min": 20, "max": 27, "label": "Severe depression"}]}',
                   true, 'system', 'system'),
                  (v_tenant_id,
                   'GAD-7 Anxiety Scale',
                   'Generalized Anxiety Disorder 7-item scale — validated screening tool for generalized anxiety disorder. Score 0-21.',
                   'mental_health',
                   '[
                     {"id": 1, "text": "Feeling nervous, anxious, or on edge?", "type": "scale", "options": ["Not at all (0)", "Several days (1)", "More than half the days (2)", "Nearly every day (3)"]},
                     {"id": 2, "text": "Not being able to stop or control worrying?", "type": "scale", "options": ["Not at all (0)", "Several days (1)", "More than half the days (2)", "Nearly every day (3)"]},
                     {"id": 3, "text": "Worrying too much about different things?", "type": "scale", "options": ["Not at all (0)", "Several days (1)", "More than half the days (2)", "Nearly every day (3)"]},
                     {"id": 4, "text": "Trouble relaxing?", "type": "scale", "options": ["Not at all (0)", "Several days (1)", "More than half the days (2)", "Nearly every day (3)"]},
                     {"id": 5, "text": "Being so restless that it is hard to sit still?", "type": "scale", "options": ["Not at all (0)", "Several days (1)", "More than half the days (2)", "Nearly every day (3)"]},
                     {"id": 6, "text": "Becoming easily annoyed or irritable?", "type": "scale", "options": ["Not at all (0)", "Several days (1)", "More than half the days (2)", "Nearly every day (3)"]},
                     {"id": 7, "text": "Feeling afraid as if something awful might happen?", "type": "scale", "options": ["Not at all (0)", "Several days (1)", "More than half the days (2)", "Nearly every day (3)"]}
                   ]',
                   '{"ranges": [{"min": 0, "max": 4, "label": "Minimal anxiety"}, {"min": 5, "max": 9, "label": "Mild anxiety"}, {"min": 10, "max": 14, "label": "Moderate anxiety"}, {"min": 15, "max": 21, "label": "Severe anxiety"}]}',
                   true, 'system', 'system'),
                  (v_tenant_id,
                   'AUDIT Alcohol Screening',
                   'Alcohol Use Disorders Identification Test — 10-item WHO-validated tool for alcohol use disorder screening. Score 0-40.',
                   'substance_use',
                   '[
                     {"id": 1, "text": "How often do you have a drink containing alcohol?", "type": "choice", "options": ["Never (0)", "Monthly or less (1)", "2-4 times a month (2)", "2-3 times a week (3)", "4 or more times a week (4)"]},
                     {"id": 2, "text": "How many drinks containing alcohol do you have on a typical day when you are drinking?", "type": "choice", "options": ["1-2 (0)", "3-4 (1)", "5-6 (2)", "7-9 (3)", "10 or more (4)"]},
                     {"id": 3, "text": "How often do you have six or more drinks on one occasion?", "type": "choice", "options": ["Never (0)", "Less than monthly (1)", "Monthly (2)", "Weekly (3)", "Daily or almost daily (4)"]},
                     {"id": 4, "text": "How often during the last year have you found that you were not able to stop drinking once you had started?", "type": "choice", "options": ["Never (0)", "Less than monthly (1)", "Monthly (2)", "Weekly (3)", "Daily or almost daily (4)"]},
                     {"id": 5, "text": "How often during the last year have you failed to do what was normally expected from you because of drinking?", "type": "choice", "options": ["Never (0)", "Less than monthly (1)", "Monthly (2)", "Weekly (3)", "Daily or almost daily (4)"]},
                     {"id": 6, "text": "How often during the last year have you needed a first drink in the morning to get yourself going after a heavy drinking session?", "type": "choice", "options": ["Never (0)", "Less than monthly (1)", "Monthly (2)", "Weekly (3)", "Daily or almost daily (4)"]},
                     {"id": 7, "text": "How often during the last year have you had a feeling of guilt or remorse after drinking?", "type": "choice", "options": ["Never (0)", "Less than monthly (1)", "Monthly (2)", "Weekly (3)", "Daily or almost daily (4)"]},
                     {"id": 8, "text": "How often during the last year have you been unable to remember what happened the night before because you had been drinking?", "type": "choice", "options": ["Never (0)", "Less than monthly (1)", "Monthly (2)", "Weekly (3)", "Daily or almost daily (4)"]},
                     {"id": 9, "text": "Have you or someone else been injured as a result of your drinking?", "type": "choice", "options": ["No (0)", "Yes, but not in the last year (2)", "Yes, during the last year (4)"]},
                     {"id": 10, "text": "Has a relative or friend, or a doctor or other health worker, been concerned about your drinking or suggested you cut down?", "type": "choice", "options": ["No (0)", "Yes, but not in the last year (2)", "Yes, during the last year (4)"]}
                   ]',
                   '{"ranges": [{"min": 0, "max": 7, "label": "Low risk"}, {"min": 8, "max": 15, "label": "Hazardous drinking"}, {"min": 16, "max": 19, "label": "Harmful drinking"}, {"min": 20, "max": 40, "label": "Possible alcohol dependence"}]}',
                   true, 'system', 'system')
                ON CONFLICT DO NOTHING;
              END $$;

  - changeSet:
      id: 028-seed-email-templates
      author: primus
      comment: 2 patient-facing email templates — appointment reminder and lab results
      changes:
        - sql:
            sql: |
              DO $$
              DECLARE
                v_tenant_id BIGINT;
              BEGIN
                SELECT id INTO v_tenant_id FROM tenants WHERE subdomain = 'primusdemo';
                IF v_tenant_id IS NULL THEN RETURN; END IF;

                INSERT INTO email_templates
                  (tenant_id, name, subject_template, body_template, category, created_by, modified_by)
                VALUES
                  (v_tenant_id,
                   'Appointment Reminder',
                   'Appointment Reminder — {{appointmentDate}} at {{clinicName}}',
                   'Dear {{patientFirstName}},

This is a friendly reminder that you have an upcoming appointment scheduled with {{providerName}} at {{clinicName}}.

Appointment Details:
  Date:     {{appointmentDate}}
  Time:     {{appointmentTime}}
  Type:     {{appointmentType}}
  Location: {{locationName}}
             {{locationAddress}}

To confirm, cancel, or reschedule your appointment, please reply to this email or call us at {{clinicPhone}}.

If this is a telehealth appointment, your video link will be sent 15 minutes before your scheduled time.

Please arrive 10 minutes early to complete any paperwork if this is your first visit.

Thank you for choosing {{clinicName}}. We look forward to seeing you.

Warm regards,
{{clinicName}} Care Team
{{clinicPhone}} | {{clinicEmail}}',
                   'scheduling', 'system', 'system'),
                  (v_tenant_id,
                   'Lab Results Available',
                   'Your Lab Results Are Ready — {{clinicName}} Patient Portal',
                   'Dear {{patientFirstName}},

Your recent lab results are now available in your patient portal.

Lab Order Details:
  Ordered By: {{providerName}}
  Order Date: {{orderDate}}
  Results Date: {{resultsDate}}

To view your results, please log in to the patient portal at {{portalUrl}}.

If you have any questions about your results, please send a secure message to your care team through the portal or call us at {{clinicPhone}} to schedule a follow-up appointment.

IMPORTANT: Do not reply to this email. For clinical questions, please use the secure messaging feature in your patient portal or call our office directly.

Thank you for trusting {{clinicName}} with your care.

Warm regards,
{{clinicName}} Care Team
{{clinicPhone}} | {{clinicEmail}}',
                   'clinical', 'system', 'system')
                ON CONFLICT ON CONSTRAINT uq_email_templates_tenant_name DO NOTHING;
              END $$;

  - changeSet:
      id: 028-seed-patient-family-history
      author: primus
      comment: Family history for PAT-10001 (Sarah Johnson) and PAT-10002 (Marcus Rivera)
      changes:
        - sql:
            sql: |
              DO $$
              DECLARE
                v_tenant_id BIGINT;
                v_pat1_id   BIGINT;
                v_pat2_id   BIGINT;
              BEGIN
                SELECT id INTO v_tenant_id FROM tenants WHERE subdomain = 'primusdemo';
                IF v_tenant_id IS NULL THEN RETURN; END IF;

                SELECT id INTO v_pat1_id FROM patients WHERE mrn = 'PAT-10001' AND tenant_id = v_tenant_id;
                SELECT id INTO v_pat2_id FROM patients WHERE mrn = 'PAT-10002' AND tenant_id = v_tenant_id;

                -- Sarah Johnson family history
                IF v_pat1_id IS NOT NULL THEN
                  INSERT INTO family_history
                    (tenant_id, patient_id, relationship, condition, icd10_code, onset_age, deceased, notes, created_by, modified_by)
                  VALUES
