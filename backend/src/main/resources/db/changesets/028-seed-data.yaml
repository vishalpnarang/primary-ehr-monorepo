databaseChangeLog:

  # ── 028 Comprehensive seed data for demo environment ─────────────────────────
  # All INSERTs are idempotent via ON CONFLICT DO NOTHING.
  # Tenant is resolved by subdomain = 'primusdemo' so this works regardless of
  # what auto-generated id the BIGSERIAL assigned during provisioning.

  - changeSet:
      id: 028-seed-appointment-types
      author: primus
      comment: 5 standard appointment types for Primus Think demo tenant
      changes:
        - sql:
            sql: |
              DO $$
              DECLARE
                v_tenant_id BIGINT;
              BEGIN
                SELECT id INTO v_tenant_id FROM tenants WHERE subdomain = 'primusdemo';
                IF v_tenant_id IS NULL THEN RETURN; END IF;

                INSERT INTO appointment_types
                  (tenant_id, name, duration_minutes, color, description, allow_online_booking, created_by, modified_by)
                VALUES
                  (v_tenant_id, 'New Patient',       60, '#3B82F6',
                   'Initial visit for new patients — comprehensive history and physical', true,  'system', 'system'),
                  (v_tenant_id, 'Follow-Up',         20, '#10B981',
                   'Return visit for established patients — ongoing care and medication management', true,  'system', 'system'),
                  (v_tenant_id, 'Annual Wellness',   45, '#14B8A6',
                   'Annual wellness exam — preventive care, screenings, and HEDIS measures', true,  'system', 'system'),
                  (v_tenant_id, 'Telehealth',        20, '#8B5CF6',
                   'Virtual visit via video — follow-ups, prescription refills, minor concerns', true,  'system', 'system'),
                  (v_tenant_id, 'Urgent',            30, '#EF4444',
                   'Same-day urgent visit — acute illness, injury, or concerning symptoms', false, 'system', 'system')
                ON CONFLICT ON CONSTRAINT uq_appointment_types_tenant_name DO NOTHING;
              END $$;

