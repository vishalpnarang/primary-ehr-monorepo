databaseChangeLog:
  - changeSet:
      id: 021-create-membership-plans
      author: primus
      comment: Direct Primary Care membership plan definitions per tenant
      changes:
        - createTable:
            tableName: membership_plans
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: uuid
                  type: VARCHAR(36)
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    unique: true
                    nullable: false
              - column:
                  name: tenant_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_membership_plans_tenant
                    references: tenants(id)
              - column:
                  name: name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: TEXT
              - column:
                  name: price_monthly
                  type: DECIMAL(10,2)
              - column:
                  name: price_annual
                  type: DECIMAL(10,2)
              - column:
                  name: features
                  type: JSONB
              - column:
                  name: max_visits_per_year
                  type: INTEGER
              - column:
                  name: includes_telehealth
                  type: BOOLEAN
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
              - column:
                  name: is_active
                  type: BOOLEAN
                  defaultValueBoolean: true
                  constraints:
                    nullable: false
              - column:
                  name: created_by
                  type: VARCHAR(255)
              - column:
                  name: modified_by
                  type: VARCHAR(255)
              - column:
                  name: created
                  type: TIMESTAMP
                  defaultValueComputed: now()
              - column:
                  name: modified
                  type: TIMESTAMP
                  defaultValueComputed: now()
              - column:
                  name: archive
                  type: BOOLEAN
                  defaultValueBoolean: false

  - changeSet:
      id: 021-create-plan-enrollments
      author: primus
      comment: Patient enrollment in membership plans — links to Stripe subscriptions
      changes:
        - createTable:
            tableName: plan_enrollments
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: uuid
                  type: VARCHAR(36)
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    unique: true
                    nullable: false
              - column:
                  name: tenant_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_plan_enrollments_tenant
                    references: tenants(id)
              - column:
                  name: patient_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_plan_enrollments_patient
                    references: patients(id)
              - column:
                  name: plan_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_plan_enrollments_plan
                    references: membership_plans(id)
              - column:
                  name: start_date
                  type: DATE
                  constraints:
                    nullable: false
              - column:
                  name: end_date
                  type: DATE
              - column:
                  name: status
                  type: VARCHAR(20)
                  defaultValue: ACTIVE
                  constraints:
                    nullable: false
              - column:
                  name: billing_interval
                  type: VARCHAR(20)
                  defaultValue: MONTHLY
                  constraints:
                    nullable: false
              - column:
                  name: stripe_subscription_id
                  type: VARCHAR(255)
              - column:
                  name: created_by
                  type: VARCHAR(255)
              - column:
                  name: modified_by
                  type: VARCHAR(255)
              - column:
                  name: created
                  type: TIMESTAMP
                  defaultValueComputed: now()
              - column:
                  name: modified
                  type: TIMESTAMP
                  defaultValueComputed: now()
              - column:
                  name: archive
                  type: BOOLEAN
                  defaultValueBoolean: false

  - changeSet:
      id: 021-plan-enrollments-index
      author: primus
      comment: Index for enrollment lookup by patient
      changes:
        - createIndex:
            tableName: plan_enrollments
            indexName: idx_plan_enrollments_patient_tenant
            columns:
              - column:
                  name: patient_id
              - column:
                  name: tenant_id
