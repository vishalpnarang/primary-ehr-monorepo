databaseChangeLog:
  - changeSet:
      id: 019-create-invoices
      author: primus
      comment: Patient invoices — billable documents generated from encounters or manually
      changes:
        - createTable:
            tableName: invoices
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: uuid
                  type: VARCHAR(36)
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    unique: true
                    nullable: false
              - column:
                  name: tenant_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_invoices_tenant
                    references: tenants(id)
              - column:
                  name: patient_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_invoices_patient
                    references: patients(id)
              - column:
                  name: encounter_id
                  type: BIGINT
                  constraints:
                    foreignKeyName: fk_invoices_encounter
                    references: encounters(id)
              - column:
                  name: invoice_number
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: subtotal
                  type: DECIMAL(12,2)
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
              - column:
                  name: tax
                  type: DECIMAL(12,2)
                  defaultValueNumeric: 0
              - column:
                  name: discount
                  type: DECIMAL(12,2)
                  defaultValueNumeric: 0
              - column:
                  name: total
                  type: DECIMAL(12,2)
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
              - column:
                  name: amount_paid
                  type: DECIMAL(12,2)
                  defaultValueNumeric: 0
              - column:
                  name: balance_due
                  type: DECIMAL(12,2)
                  defaultValueNumeric: 0
              - column:
                  name: status
                  type: VARCHAR(20)
                  defaultValue: DRAFT
                  constraints:
                    nullable: false
              - column:
                  name: due_date
                  type: DATE
              - column:
                  name: sent_date
                  type: DATE
              - column:
                  name: created_by
                  type: VARCHAR(255)
              - column:
                  name: modified_by
                  type: VARCHAR(255)
              - column:
                  name: created
                  type: TIMESTAMP
                  defaultValueComputed: now()
              - column:
                  name: modified
                  type: TIMESTAMP
                  defaultValueComputed: now()
              - column:
                  name: archive
                  type: BOOLEAN
                  defaultValueBoolean: false

  - changeSet:
      id: 019-invoices-index
      author: primus
      comment: Index for fast invoice lookup by patient
      changes:
        - createIndex:
            tableName: invoices
            indexName: idx_invoices_patient_tenant
            columns:
              - column:
                  name: patient_id
              - column:
                  name: tenant_id

  - changeSet:
      id: 019-create-invoice-line-items
      author: primus
      comment: Line items on each invoice — CPT codes, charges, quantities
      changes:
        - createTable:
            tableName: invoice_line_items
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: uuid
                  type: VARCHAR(36)
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    unique: true
                    nullable: false
              - column:
                  name: tenant_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_invoice_line_items_tenant
                    references: tenants(id)
              - column:
                  name: invoice_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_invoice_line_items_invoice
                    references: invoices(id)
              - column:
                  name: description
                  type: VARCHAR(500)
                  constraints:
                    nullable: false
              - column:
                  name: cpt_code
                  type: VARCHAR(20)
              - column:
                  name: icd_codes
                  type: JSONB
              - column:
                  name: quantity
                  type: INTEGER
                  defaultValueNumeric: 1
                  constraints:
                    nullable: false
              - column:
                  name: unit_price
                  type: DECIMAL(10,2)
                  constraints:
                    nullable: false
              - column:
                  name: amount
                  type: DECIMAL(12,2)
                  constraints:
                    nullable: false
              - column:
                  name: created_by
                  type: VARCHAR(255)
              - column:
                  name: modified_by
                  type: VARCHAR(255)
              - column:
                  name: created
                  type: TIMESTAMP
                  defaultValueComputed: now()
              - column:
                  name: modified
                  type: TIMESTAMP
                  defaultValueComputed: now()
              - column:
                  name: archive
                  type: BOOLEAN
                  defaultValueBoolean: false

  - changeSet:
      id: 019-invoice-line-items-index
      author: primus
      comment: Index for line item lookup by invoice
      changes:
        - createIndex:
            tableName: invoice_line_items
            indexName: idx_invoice_line_items_invoice_id
            columns:
              - column:
                  name: invoice_id

  - changeSet:
      id: 019-create-invoice-settings
      author: primus
      comment: Tenant-level billing/invoice configuration
      changes:
        - createTable:
            tableName: invoice_settings
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: uuid
                  type: VARCHAR(36)
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    unique: true
                    nullable: false
              - column:
                  name: tenant_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    unique: true
                    foreignKeyName: fk_invoice_settings_tenant
                    references: tenants(id)
              - column:
                  name: billing_name
                  type: VARCHAR(255)
              - column:
                  name: billing_address
                  type: TEXT
              - column:
                  name: tax_rate
                  type: DECIMAL(5,2)
                  defaultValueNumeric: 0
              - column:
                  name: payment_terms_days
                  type: INTEGER
                  defaultValueNumeric: 30
              - column:
                  name: auto_send
                  type: BOOLEAN
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
              - column:
                  name: late_fee_rate
                  type: DECIMAL(5,2)
                  defaultValueNumeric: 0
              - column:
                  name: created_by
                  type: VARCHAR(255)
              - column:
                  name: modified_by
                  type: VARCHAR(255)
              - column:
                  name: created
                  type: TIMESTAMP
                  defaultValueComputed: now()
              - column:
                  name: modified
                  type: TIMESTAMP
                  defaultValueComputed: now()
              - column:
                  name: archive
                  type: BOOLEAN
                  defaultValueBoolean: false
