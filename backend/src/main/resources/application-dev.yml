spring:
  jpa:
    show-sql: true
  liquibase:
    enabled: true

# Dev-only AES-256 encryption key (32 bytes, Base64-encoded).
# Generate for prod: openssl rand -base64 32
# In production, inject via AWS Secrets Manager — NEVER use this value.
primus:
  security:
    encryption:
      key: "ZGV2LW9ubHktMzItYnl0ZS1rZXktZG8tbm90LXVzZQ=="

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE
    com.thinkitive.primus: DEBUG
    org.springframework.security: DEBUG
    org.springframework.web: DEBUG
