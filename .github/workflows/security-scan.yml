name: Security Scan (OWASP ZAP)

on:
  schedule:
    - cron: '0 2 * * 1' # Every Monday at 2 AM UTC
  workflow_dispatch:

jobs:
  zap-scan:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: primus
          POSTGRES_PASSWORD: primus
          POSTGRES_DB: primus_ehr
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: corretto
          java-version: 21
          cache: maven

      - name: Start backend
        run: |
          cd backend && ./mvnw spring-boot:run &
          sleep 30
          curl -sf http://localhost:8080/actuator/health || exit 1
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/primus_ehr
          SPRING_DATASOURCE_USERNAME: primus
          SPRING_DATASOURCE_PASSWORD: primus

      - name: Run OWASP ZAP scan
        uses: zaproxy/action-full-scan@v0.12.0
        with:
          target: 'http://localhost:8080'
          rules_file_name: 'e2e/security/zap-config.yaml'
          allow_issue_writing: false

      - name: Upload ZAP report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-security-report
          path: report_html.html
