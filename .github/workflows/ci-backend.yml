name: Backend CI

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
  pull_request:
    branches: [main]
    paths:
      - 'backend/**'

jobs:
  test-build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: primus
          POSTGRES_PASSWORD: primus
          POSTGRES_DB: primus_ehr
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: corretto
          java-version: 21
          cache: maven

      - name: Run tests
        run: cd backend && ./mvnw test -B
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/primus_ehr
          SPRING_DATASOURCE_USERNAME: primus
          SPRING_DATASOURCE_PASSWORD: primus

      - name: Build
        run: cd backend && ./mvnw package -DskipTests -B

      - name: SonarQube analysis
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: cd backend && ./mvnw sonar:sonar -Dsonar.host.url=${{ secrets.SONAR_URL }} -Dsonar.token=${{ secrets.SONAR_TOKEN }} -B
        continue-on-error: true

  docker:
    runs-on: ubuntu-latest
    needs: test-build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: corretto
          java-version: 21
          cache: maven

      - name: Build JAR
        run: cd backend && ./mvnw package -DskipTests -B

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: backend
          push: true
          tags: ghcr.io/primus-ehr/backend:latest,ghcr.io/primus-ehr/backend:${{ github.sha }}
